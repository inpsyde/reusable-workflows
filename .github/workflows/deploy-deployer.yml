name: Deploy with Deployer

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: Name of the target environment to load Deployer settings.
        type: string
        required: true
      VERBOSITY:
        description: Deployer command verbosity.
        required: false
        default: 'v'
        type: string
      PHP_VERSION:
        description: PHP version with which the scripts are executed.
        default: '8.2'
        required: false
        type: string
      PHP_TOOLS:
        description: PHP tools supported by shivammathur/setup-php to be installed.
        default: ''
        required: false
        type: string
      PHP_EXTENSIONS:
        description: PHP extensions supported by shivammathur/setup-php to be installed or disabled.
        default: ''
        required: false
        type: string
      NODE_VERSION:
        description: Node.js version to use when npm workspaces are detected.
        default: '22'
        required: false
        type: string
      NPM_REGISTRY_DOMAIN:
        description: Domain of the private npm registry.
        default: https://npm.pkg.github.com/
        required: false
        type: string
    secrets:
      COMPOSER_AUTH_JSON:
        description: Authentication for privately hosted packages and repositories as a JSON formatted object.
        required: true
      GITHUB_USER_SSH_KEY:
        description: Private SSH key to be used to reach remote destinations.
        required: true
      DEPLOY_HOSTNAME:
        description: Name of the target host.
        required: false
      DEPLOY_PORT:
        description: SSH port on the target host.
        required: false
      DEPLOY_USER:
        description: SSH user on the target host.
        required: false
      WIREGUARD_CONFIGURATION:
        description: The full content of the WireGuard configuration file.
        required: false
      NPM_REGISTRY_TOKEN:
        description: Authentication for the private npm registry.
        required: false
    outputs:
      deploy_exit_code:
        description: Deployer process exit code (0=success, 1=error, 2=warning).
        value: ${{ jobs.deploy.outputs.exit_code }}
      deploy_reason:
        description: Human-readable deployment result message parsed from Deployer output.
        value: ${{ jobs.deploy.outputs.reason }}
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      COMPOSER_NO_DEV: 1
    outputs:
      exit_code: ${{ steps.run-deployer.outputs.exit_code }}
      reason: ${{ steps.run-deployer.outputs.reason }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.GITHUB_USER_SSH_KEY }}

      - name: Set up Git
        uses: inpsyde/reusable-workflows/.github/actions/setup-git@main
        with:
          ssh-private-key: ${{ secrets.GITHUB_USER_SSH_KEY }}

      - name: Set up WireGuard
        uses: inpsyde/actions/setup-wireguard@v1
        env:
          WIREGUARD_CONFIGURATION: ${{ secrets.WIREGUARD_CONFIGURATION }}
        if: ${{ env.WIREGUARD_CONFIGURATION != '' }}
        with:
          wireguard-configuration: ${{ secrets.WIREGUARD_CONFIGURATION }}

      - name: Set up PHP
        uses: inpsyde/reusable-workflows/.github/actions/setup-php@main
        with:
          php-version: ${{ inputs.PHP_VERSION }}
          php-extensions: ${{ inputs.PHP_EXTENSIONS }}
          php-tools: 'composer, ${{ inputs.PHP_TOOLS }}'
          composer-options: ''
          composer-auth-json: ${{ secrets.COMPOSER_AUTH_JSON }}

      - name: Detect npm workspaces
        id: npm-workspaces
        run: |
          if [ -f package.json ] && node -e "const p = require('./package.json'); if (!p.workspaces) process.exit(1)"; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node
        if: steps.npm-workspaces.outputs.enabled == 'true'
        uses: inpsyde/reusable-workflows/.github/actions/setup-node@main
        with:
          node-version: ${{ inputs.NODE_VERSION }}
          registry-url: ${{ inputs.NPM_REGISTRY_DOMAIN }}
          node-auth-token: ${{ secrets.NPM_REGISTRY_TOKEN }}

      - name: Run the build using workspaces
        if: steps.npm-workspaces.outputs.enabled == 'true'
        run: npm run build -ws --if-present

      - name: Install Deployer
        uses: ramsey/composer-install@v3
        env:
          COMPOSER_AUTH: '${{ secrets.COMPOSER_AUTH_JSON }}'
        with:
          working-directory: ./deployment

      - name: Configure ssh key
        env:
          DEPLOY_HOSTNAME: ${{ secrets.DEPLOY_HOSTNAME }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        if: ${{ env.DEPLOY_HOSTNAME && env.DEPLOY_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOSTNAME }} >> ~/.ssh/known_hosts

      - name: Run Deployer
        id: run-deployer
        env:
          ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
          DEPLOY_HOSTNAME: ${{ secrets.DEPLOY_HOSTNAME }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          cd deployment
          set +e
          output=$(./$(composer config bin-dir)/dep deploy ${{ inputs.ENVIRONMENT }} -${{ inputs.VERBOSITY}} 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          echo "exit_code=${exit_code}" >> $GITHUB_OUTPUT
          if [ "$exit_code" -eq 0 ]; then
            reason="Deployment completed successfully"
          elif [ "$exit_code" -eq 2 ]; then
            reason=$(echo "$output" | grep -oE '\[WARNING\][^\n]+' | head -1 | sed 's/\[WARNING\] *//')
            reason="${reason:-Deployment completed with warnings}"
          else
            reason=$(echo "$output" | grep -oE '\[(ERROR|CRITICAL)\][^\n]+' | head -1 | sed 's/\[\(ERROR\|CRITICAL\)\] *//')
            reason="${reason:-Deployment failed}"
          fi
          echo "reason=${reason}" >> $GITHUB_OUTPUT

  assert-result:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Fail on deployment error or warning
        if: needs.deploy.outputs.exit_code != '0'
        run: |
          echo "::error::Deployer exited with code ${{ needs.deploy.outputs.exit_code }}: ${{ needs.deploy.outputs.reason }}"
          exit ${{ needs.deploy.outputs.exit_code }}
